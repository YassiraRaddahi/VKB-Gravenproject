<!DOCTYPE html>
<html lang="nl">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VKB Begraafplaatsbeheer</title>
    <link rel="stylesheet" href="public/css/styles.css">
    <script src="https://unpkg.com/vue@3"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"
        integrity="sha512-h9644v03pHqrIHThkvXhB2PJ8zf5E9IyVnrSfZg8Yj8k4RsO4zldcQc4Bi9iVLUCCsqNY0b4WXVV4UB+wbWENA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

    <div id="app" class="container mx-auto p-10">
        <nav>
            <ul class="flex gap-4">
                <li><a href="index.html" class="text-blue-500 hover:underline">Home</a></li>
                <li><a href="cemeteries.html" class="text-blue-500 hover:underline">Begraafplaatsen</a></li>
                <li><a href="cemetery_managers.html" class="text-blue-500 hover:underline">Beheerders</a></li>
                <li><a href="graves.html" class="text-blue-500 hover:underline">Graven</a></li>
            </ul>
        </nav>

        <div class="flex justify-center mt-10 mb-20">
            <h2 class="title">
                Lijst met beheerders
            </h2>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            <div v-for="beheerder in beheerders" :key="beheerder.id" class="flex flex-col items-center text-center gap-4">
                <div class="h-40 w-40 mb-4">
                    <img :src="beheerder.foto_url" :alt="beheerder.naam">
                </div>
                <div class="flex gap-1">
                    <span v-for="header in headers">{{beheerder[header.field]}} </span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Vue app ---
        Vue.createApp({
            data() {
                return {
                    beheerders: [],
                    headers: [
                        { field: "voornaam" },
                        { field: "tussenvoegsel" },
                        { field: "achternaam" },
                        // { field: "e-mail" },
                        // { field: "telefoonnummer" },
                    ]
                }
            },
            mounted() {
                url = "http://localhost:3001/api/beheerders"

                axios.get(url)
                    .then(response => {
                        this.beheerders = response.data.beheerders
                    })
                    .catch(error => {
                        console.error("Fout bij ophalen beheerders:", error)
                    })
            }
        }).mount('#app')
    </script>

</body>

</html>
