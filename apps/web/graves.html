<!DOCTYPE html>
<html lang="nl">

<head>
    <title>VKB Begraafplaatsbeheer</title>
    <link rel="stylesheet" href="public/css/styles.css">
    <script src="https://unpkg.com/vue@3"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"
        integrity="sha512-h9644v03pHqrIHThkvXhB2PJ8zf5E9IyVnrSfZg8Yj8k4RsO4zldcQc4Bi9iVLUCCsqNY0b4WXVV4UB+wbWENA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<style>

</style>

<body class="flex mx-40">

    <div id="app">
        <h2 class="title">
            Lijst met graven
        </h2>
        <div v-for="graaf in graven" :key="graaf.graf_nummer">
            <img :src="graaf.foto_url" :alt="graaf.graf_nummer">

            <p>Graf: {{ graaf.graf_nummer }}</p>
            <p>Type: {{ graaf.type }}</p>
        </div>
    </div>

    <script>
        // --- Vue app ---
        Vue.createApp({
            data() {
                return {
                    graven: [],
                    headers: [
                        { field: "" },
                    ]
                }
            },
            mounted() {
                const params = new URLSearchParams(window.location.search)
                const cemetery_id = params.get('cemetery_id')
                url = `http://localhost:3001/api/graven?cemetery_id=${cemetery_id}`

                axios.get(url)
                    .then(response => {
                        this.graven = response.data.graven
                    })
                    .catch(error => {
                        console.error("Fout bij ophalen graven:", error)
                    })
            }
        }).mount('#app')
    </script>

</body>

</html>
